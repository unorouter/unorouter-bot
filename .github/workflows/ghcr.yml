name: GHCR Image

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # One NATIVE runner per arch (no QEMU emulation). Each pushes by DIGEST only; the
  # manifest job stitches the multi-arch tag.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Empty .env: the Dockerfile COPYs it, but the k8s image gets ALL config from
      # runtime env vars (which win over .env). Keeps the public image secret-free.
      - run: touch .env

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/unorouter/unorouter-bot,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=unorouter-bot-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=unorouter-bot-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  manifest:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create + push manifest list
        run: |
          IMAGE=ghcr.io/unorouter/unorouter-bot
          REFS=""
          for f in /tmp/digests/*; do REFS="$REFS $IMAGE@$(cat "$f")"; done
          for TAG in latest ${{ github.sha }}; do
            docker buildx imagetools create -t "$IMAGE:$TAG" $REFS
          done
          docker buildx imagetools inspect "$IMAGE:${{ github.sha }}"
